name: Pump.fun Profit Bot - Shift 4 (6 PM - 12 AM)

on:
  schedule:
    - cron: '0 18 * * *'
    timezone: "Asia/Kolkata"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install aiohttp websockets python-telegram-bot
      - run: python monitor_and_report.py
