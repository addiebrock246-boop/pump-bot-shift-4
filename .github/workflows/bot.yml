name: Pump.fun Monitor Bot - Shift 4 (6 PM - 12 AM)

on:
  workflow_dispatch:               # Manual trigger
  schedule:
    - cron: '0 18 * * *'           # 6:00 PM IST (if timezone set) else UTC
    timezone: "Asia/Kolkata"       # 2026 mein supported hai

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install aiohttp websockets python-telegram-bot

      - name: Run Pump.fun Monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python pump_monitor.py
